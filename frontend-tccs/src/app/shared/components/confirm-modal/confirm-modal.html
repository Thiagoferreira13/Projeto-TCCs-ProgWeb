@if (open) {
  <div class="dialog-backdrop" (click)="onCancel()">
    <div class="dialog-container" (click)="$event.stopPropagation()">

      <!-- Header -->
      <div class="dialog-header">
        <div class="dialog-header__title">
          <mat-icon class="dialog-header__icon" [class.dialog-header__icon--destructive]="destructive">
            {{ destructive ? 'warning' : 'help' }}
          </mat-icon>
          <h3 class="dialog-title">{{ title }}</h3>
        </div>
        <button class="dialog-close-btn" (click)="onCancel()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <!-- Body -->
      <div class="dialog-body">
        <p class="dialog-message">{{ message }}</p>

        @if (warningText) {
          <div class="dialog-warning">
            <mat-icon class="dialog-warning__icon">info</mat-icon>
            <span class="dialog-warning__text">{{ warningText }}</span>
          </div>
        }
      </div>

      <!-- Footer -->
      <div class="dialog-footer">
        <button class="dialog-btn dialog-btn--cancel" (click)="onCancel()">
          {{ cancelLabel }}
        </button>
        <button
          class="dialog-btn"
          [class.dialog-btn--confirm]="!destructive"
          [class.dialog-btn--destructive]="destructive"
          (click)="onConfirm()">
          {{ confirmLabel }}
        </button>
      </div>

    </div>
  </div>
}
