<app-list-page>

  <app-page-header
    pageTitle="Listagem de Alunos"
    subtitle="Gerencie e acompanhe os alunos cadastrados no sistema."
    buttonText="Novo Aluno"
    buttonIcon="add"
    (buttonClick)="abrirCadastro()">
  </app-page-header>

  <app-search-bar
    placeholder="Buscar por nome ou ou matrícula..."
    (search)="onSearch($event)">
  </app-search-bar>

  <app-table-list
    [columns]="columns"
    [totalItems]="alunos.length"
    [pageSize]="pageSize"
    (pageChange)="onPageChange($event)">

    @for (aluno of paginatedAlunos; track aluno.id) {
      <tr table-body>
        <td>{{ aluno.nome }}</td>
        <td>{{ aluno.matricula }}</td>
        <td>{{ aluno.curso }}</td>
        <td>
          <div class="col-actions">
            <mat-icon class="action-icon" (click)="editarAluno(aluno)">edit</mat-icon>
            <mat-icon class="action-icon action-icon--delete" (click)="excluirAluno(aluno)">delete</mat-icon>
          </div>
        </td>
      </tr>
    }

  </app-table-list>

  <app-form-modal
    [open]="formOpen"
    [title]="alunoEmEdicao ? 'Editar Aluno' : 'Novo Aluno'"
    [titleIcon]="alunoEmEdicao ? 'edit' : 'person_add'"
    [submitLabel]="alunoEmEdicao ? 'Salvar' : 'Cadastrar'"
    [fields]="fields"
    [initialValue]="alunoEmEdicao"
    (submitted)="onSubmit($event)"
    (cancelled)="formOpen = false">
  </app-form-modal>

  <app-confirm-modal
    [open]="confirmOpen"
    title="Excluir Aluno"
    message="Tem certeza que deseja excluir este aluno? Esta ação é irreversível."
    warningText="Os TCCs vinculados a este aluno serão arquivados automaticamente."
    confirmLabel="Excluir"
    [destructive]="true"
    (confirmed)="onConfirmDelete()"
    (cancelled)="confirmOpen = false">
  </app-confirm-modal>

</app-list-page>
