<app-list-page>

  <app-page-header
    pageTitle="Listagem de Alunos"
    subtitle="Gerencie e acompanhe os alunos cadastrados no sistema."
    buttonText="Novo Aluno"
    buttonIcon="add">
  </app-page-header>

  <app-table-list
    [columns]="columns"
    [totalItems]="alunos.length"
    [pageSize]="pageSize"
    (pageChange)="onPageChange($event)">

    @for (aluno of paginatedAlunos; track aluno.id) {
      <tr table-body>
        <td>{{ aluno.nome }}</td>
        <td>{{ aluno.matricula }}</td>
        <td>{{ aluno.curso }}</td>
        <td>
          <div class="col-actions">
            <mat-icon class="action-icon" (click)="editarAluno(aluno)">edit</mat-icon>
            <mat-icon class="action-icon action-icon--delete" (click)="excluirAluno(aluno)">delete</mat-icon>
          </div>
        </td>
      </tr>
    }

  </app-table-list>

  <app-confirm-modal
    [open]="dialogOpen"
    title="Excluir Aluno"
    message="Tem certeza que deseja excluir este aluno? Esta ação é irreversível."
    warningText="Os TCCs vinculados a este aluno serão arquivados automaticamente."
    confirmLabel="Excluir"
    [destructive]="true"
    (confirmed)="onConfirmDelete()"
    (cancelled)="dialogOpen = false">
  </app-confirm-modal>

</app-list-page>
