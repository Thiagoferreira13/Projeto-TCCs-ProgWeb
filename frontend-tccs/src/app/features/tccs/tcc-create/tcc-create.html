<div class="page-container">

  <!-- HEADER -->
  <div class="page-header">
    <div class="page-header__info">
      <h1 class="page-header__title">Novo Registro de TCC</h1>
      <p class="page-header__subtitle">
        Preencha os campos abaixo para cadastrar um novo trabalho de conclusão de curso.
      </p>
    </div>
  </div>

  @if (erro()) {
  <div class="form-error">{{ erro() }}</div>
  }

  <!-- FORMULÁRIO (componente reutilizável) -->
  <app-tcc-form></app-tcc-form>

  <!-- AÇÕES -->
  <div class="form-actions">
    <button class="btn-text" (click)="cancelar()" [disabled]="salvando()">Cancelar</button>
    <button class="btn-primary" (click)="salvar()" [disabled]="salvando()">
      <mat-icon>save</mat-icon>
      {{ salvando() ? 'Salvando...' : 'Salvar TCC' }}
    </button>
  </div>

  <!--Footer da página-->
  <div class="page-footer">
    © 2024 Universidade Federal - Sistema de Gestão de TCC
  </div>

</div>
