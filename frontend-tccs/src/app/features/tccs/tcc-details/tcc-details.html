<div class="page-container">
  <!-- HEADER -->
  <div class="page-header">
    <div class="page-header__info">
      <h1 class="page-header__title">Detalhes do TCC</h1>
      <p class="page-header__subtitle">
        Visualize as informações completas do trabalho de conclusão de curso.
      </p>
    </div>
  </div>

  @if (carregando()) {
  <div class="form-error" style="background-color: #f3f4f6; color: #6b7280;">Carregando dados do TCC...</div>
  }

  @if (erro()) {
  <div class="form-error">{{ erro() }}</div>
  }

  @if (!carregando() && !erro()) {
  <!-- FORMULÁRIO em modo somente leitura -->
  <app-tcc-form [tcc]="tcc()" [somenteLeitura]="true"></app-tcc-form>

  <!-- AÇÕES-->
  <div class="form-actions">
    <button class="btn-text" (click)="voltar()">Voltar</button>
    <button class="btn-primary" (click)="editar()">
      <mat-icon>edit</mat-icon>
      Editar
    </button>
  </div>
  }

  <!--Footer da página-->
  <div class="page-footer">
    © 2024 Universidade Federal - Sistema de Gestão de TCC
  </div>

</div>
