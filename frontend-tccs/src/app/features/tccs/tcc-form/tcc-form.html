<form [formGroup]="form">
  @if (erroOpcoes()) {
  <div class="lookup-error">
    <mat-icon>error</mat-icon>
    <span>{{ erroOpcoes() }}</span>
  </div>
  }

  <!--Card: Informações do Trabalho-->
  <div class="form-card">
    <h2 class="form-card__title">
      <mat-icon>description</mat-icon>
      Informações do Trabalho
    </h2>

    <!--Título-->
    <div class="form-field">
      <label class="form-label">Título do Trabalho</label>
      <input type="text" class="form-input" formControlName="titulo" placeholder="Insira o título completo do TCC" />
    </div>

    <!--Resumo-->
    <div class="form-field">
      <label class="form-label">Resumo</label>
      <textarea class="form-textarea" formControlName="resumo"
        placeholder="Breve descrição dos objetivos e resultados..."></textarea>
    </div>

    <!--Linha com Palavras-chave Tipo de Trabalho e idioma-->
    <div class="form-row">
      <!--Palavras-chave-->
      <div class="form-field">
        <label class="form-label">Palavras-chave</label>
        <input class="form-input" type="text" formControlName="palavras_chave" placeholder="Ex: IA, Saúde, Python" />
      </div>

      <!--Tipo de Trabalho-->
      <div class="form-field">
        <label class="form-label">Tipo de Trabalho</label>
        <select class="form-select" formControlName="tipo">
          <option value="MONOGRAFIA">Monografia</option>
          <option value="RELATORIO_ESTAGIO">Relatório de Estágio</option>
          <option value="RELATORIO_TECNICO">Relatório Técnico</option>
          <option value="ARTIGO">Artigo</option>
        </select>
      </div>

      <!--Idioma-->
      <div class="form-field">
        <label class="form-label">Idioma</label>
        <select class="form-select" formControlName="idioma">
          <option value="PT">Português</option>
          <option value="EN">Inglês</option>
        </select>
      </div>

    </div>
  </div>

  <!--Card: Dados do Aluno-->
  <div class="form-card">
    <h2 class="form-card__title">
      <mat-icon>person</mat-icon>
      Dados do Aluno
    </h2>

    <div class="form-field">
      <label class="form-label">Aluno</label>
      <select class="form-select" formControlName="aluno">
        @if (carregandoOpcoes()) {
        <option [ngValue]="null">Carregando opções...</option>
        } @else {
        <option [ngValue]="null" disabled>Selecione o aluno</option>
        @if (alunoSelecionadoAusente()) {
        <option [ngValue]="alunoSelecionadoId()">Aluno não encontrado</option>
        }
        @for (aluno of alunos(); track aluno.id) {
        <option [ngValue]="aluno.id">{{ alunoLabel(aluno) }}</option>
        }
        }
      </select>
    </div>
  </div>

  <!-- Linha com 2 Cards: Orientção e Defesa -->
  <div class="form-grid-2">

    <!--Card esquerdo-->
    <div class="form-card">
      <h2 class="form-card__title">
        <mat-icon>school</mat-icon>
        Orientação
      </h2>

      <div class="form-field">
        <label class="form-label">Orientador</label>
        <select class="form-select" formControlName="orientador">
          @if (carregandoOpcoes()) {
          <option [ngValue]="null">Carregando opções...</option>
          } @else {
          <option [ngValue]="null" disabled>Selecione o orientador</option>
          @if (professorSelecionadoAusente('orientador')) {
          <option [ngValue]="professorSelecionadoId('orientador')">Professor não encontrado</option>
          }
          @for (professor of professores(); track professor.id) {
          <option [ngValue]="professor.id">{{ professorLabel(professor) }}</option>
          }
          }
        </select>
      </div>

      <div class="form-field">
        <label class="form-label">Coorientador (opcional)</label>
        <select class="form-select" formControlName="coorientador">
          @if (carregandoOpcoes()) {
          <option [ngValue]="null">Carregando opções...</option>
          } @else {
          <option [ngValue]="null">Sem coorientador</option>
          @if (professorSelecionadoAusente('coorientador')) {
          <option [ngValue]="professorSelecionadoId('coorientador')">Professor não encontrado</option>
          }
          @for (professor of professores(); track professor.id) {
          <option [ngValue]="professor.id">{{ professorLabel(professor) }}</option>
          }
          }
        </select>
      </div>
    </div>

    <!--Card direito-->
    <div class="form-card">
      <h2 class="form-card__title">
        <mat-icon>event</mat-icon>
        Defesa e Arquivo
      </h2>

      <!--Status-->
      <div class="form-field">
        <label class="form-label">Status</label>
        <select class="form-select" formControlName="status">
          <option value="0">Em Elaboração</option>
          <option value="1">Enviado</option>
          <option value="2">Aprovado</option>
          <option value="3">Reprovado</option>
        </select>
      </div>

      <!--Semestre-->
      <div class="form-field">
        <label class="form-label">Semestre Letivo</label>
        <select class="form-select" formControlName="semestre_letivo_defesa">
          <option value="">Selecione o semestre</option>
          <option value="2020/1">2020/1</option>
          <option value="2020/2">2020/2</option>
          <option value="2021/1">2021/1</option>
          <option value="2021/2">2021/2</option>
          <option value="2022/1">2022/1</option>
          <option value="2022/2">2022/2</option>
          <option value="2023/1">2023/1</option>
          <option value="2023/2">2023/2</option>
          <option value="2024/1">2024/1</option>
          <option value="2024/2">2024/2</option>
          <option value="2025/1">2025/1</option>
          <option value="2025/2">2025/2</option>
          <option value="2026/1">2026/1</option>
        </select>
      </div>
    </div>

  </div>


  <!-- CARD: BANCA EXAMINADORA -->
  <div class="form-card">
    <h2 class="form-card__title">
      <mat-icon>groups</mat-icon>
      Banca Examinadora
    </h2>

    <!--linha com Presidente, Primeiro membro e segundo membro-->
    <div class="form-row">

      <div class="form-field">
        <label class="form-label">Presidente</label>
        <select class="form-select" formControlName="presidente">
          @if (carregandoOpcoes()) {
          <option [ngValue]="null">Carregando opções...</option>
          } @else {
          <option [ngValue]="null" disabled>Selecione o presidente</option>
          @if (professorSelecionadoAusente('presidente')) {
          <option [ngValue]="professorSelecionadoId('presidente')">Professor não encontrado</option>
          }
          @for (professor of professores(); track professor.id) {
          <option [ngValue]="professor.id">{{ professorLabel(professor) }}</option>
          }
          }
        </select>
      </div>

      <div class="form-field">
        <label class="form-label">Primeiro Membro</label>
        <select class="form-select" formControlName="primeiro_membro">
          @if (carregandoOpcoes()) {
          <option [ngValue]="null">Carregando opções...</option>
          } @else {
          <option [ngValue]="null" disabled>Selecione o primeiro membro</option>
          @if (professorSelecionadoAusente('primeiro_membro')) {
          <option [ngValue]="professorSelecionadoId('primeiro_membro')">Professor não encontrado</option>
          }
          @for (professor of professores(); track professor.id) {
          <option [ngValue]="professor.id">{{ professorLabel(professor) }}</option>
          }
          }
        </select>
      </div>

      <div class="form-field">
        <label class="form-label">Segundo Membro</label>
        <select class="form-select" formControlName="segundo_membro">
          @if (carregandoOpcoes()) {
          <option [ngValue]="null">Carregando opções...</option>
          } @else {
          <option [ngValue]="null" disabled>Selecione o segundo membro</option>
          @if (professorSelecionadoAusente('segundo_membro')) {
          <option [ngValue]="professorSelecionadoId('segundo_membro')">Professor não encontrado</option>
          }
          @for (professor of professores(); track professor.id) {
          <option [ngValue]="professor.id">{{ professorLabel(professor) }}</option>
          }
          }
        </select>
      </div>
    </div>
  </div>

</form>
